packages:
  - 'packages/**'
  - 'apps/**'
allowBuilds:
  '@swc/core': true
  core-js-pure: true
  cos-js-sdk-v5: true
  cpu-features: true
  esbuild: true
  sharp: true
  simple-git-hooks: true
  ssh2: true
peerDependencyRules:
  ignoreMissing: []
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
